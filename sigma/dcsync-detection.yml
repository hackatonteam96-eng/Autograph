title: Possible DCSync / Directory Replication Abuse
id: authgraph-dcsync-4662
status: experimental
description: |
  Detects potential DCSync attacks via Windows Event ID 4662 — an account
  requesting DS-Replication-Get-Changes-All rights against the domain NC.
  Common precursor to credential dumping from Active Directory.
author: AuthGraph ITDR Detection Team
date: 2026/06/13
references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/builtin/security/win_security_dcsync.yml
tags:
  - attack.credential_access
  - attack.t1003.006
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4662
    ObjectType: 'DS-Replication-Get-Changes-All'
  filter_dc:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_dc
falsepositives:
  - Legitimate domain controller replication
  - Azure AD Connect synchronization account
level: critical
fields:
  - SubjectUserName
  - SubjectDomainName
  - ObjectName
  - AccessMask
