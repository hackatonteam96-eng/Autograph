title: AS-REP Roasting - RC4 TGT Without Pre-Authentication (Primary)
id: authgraph-asreproasting-4768
status: experimental
description: |
  Primary AS-REP Roasting rule — delegates to full suite in sigma/asreproasting/.
  Detects Event 4768 where Kerberos pre-authentication is disabled (PreAuthType 0)
  and an RC4 TGT is issued for krbtgt — the core offline-cracking indicator.
  Deploy ALL rules in sigma/asreproasting/ for defense-in-depth.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/13
references:
  - https://attack.mitre.org/techniques/T1558/004/
  - ./asreproasting/README.md
tags:
  - attack.credential_access
  - attack.t1558.004
logsource:
  product: windows
  service: security
  definition: |
    Requirements on ALL Domain Controllers:
    - Advanced Audit Policy: Audit Kerberos Authentication Service → Success
    - Wazuh agent collecting Security channel (eventchannel)
detection:
  selection:
    EventID: 4768
    Status: '0x0'
    ServiceName: 'krbtgt'
    PreAuthType:
      - 0
      - '0'
  filter_rc4:
    TicketEncryptionType:
      - '0x17'
      - '0x1'
      - '0x23'
      - '0x3'
      - '23'
      - '1'
      - '3'
  filter_machine_user:
    TargetUserName|endswith: '$'
  filter_krbtgt_account:
    TargetUserName|contains: 'krbtgt'
  condition: selection and filter_rc4 and not 1 of filter_machine_user, filter_krbtgt_account
falsepositives:
  - Legacy accounts with pre-authentication disabled and RC4-only Kerberos
  - Misconfigured service accounts with DONT_REQ_PREAUTH flag
level: high
fields:
  - TargetUserName
  - ServiceName
  - PreAuthType
  - TicketEncryptionType
  - TicketOptions
  - IpAddress
  - WorkstationName
  - Status
