title: Password Spraying Attack Against Active Directory
id: authgraph-password-spraying-4625
status: experimental
description: |
  Detects password spraying attacks targeting Active Directory accounts.
  Alerts when one source IP generates failed logon events (4625) against
  5+ distinct usernames within 5 minutes — one password tried across many accounts.
  Deploy on Domain Controllers with Audit Logon → Failure enabled.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/13
modified: 2026/06/13
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://learn.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  product: windows
  service: security
  definition: |
    Requirements on ALL Domain Controllers:
    - Advanced Audit Policy: Audit Logon → Failure
    - Wazuh agent collecting Security channel (eventchannel)
detection:
  selection:
    EventID: 4625
    LogonType:
      - 3
      - 2
      - 10
    SubStatus:
      - '0xC000006A'
      - '0xc000006a'
      - '0xC0000064'
      - '0xc0000064'
  filter_null_ip:
    IpAddress:
      - '-'
      - ''
  filter_loopback:
    IpAddress:
      - '127.0.0.1'
      - '::1'
  filter_machine_accounts:
    TargetUserName|endswith: '$'
  filter_anonymous:
    TargetUserName:
      - 'ANONYMOUS LOGON'
      - '-'
  condition: selection and not 1 of filter_* | count_distinct(TargetUserName) by IpAddress > 5
  timeframe: 5m
falsepositives:
  - Misconfigured applications retrying auth across service accounts
  - Helpdesk or password-reset tools performing bulk authentication
  - Terminal servers, Citrix farms, and jump hosts
  - Vulnerability scanners and authorized penetration tests
  - Misconfigured SSO or federation proxies
  - Legitimate admin scripts cycling through accounts
level: medium
fields:
  - EventID
  - IpAddress
  - TargetUserName
  - TargetDomainName
  - LogonType
  - SubStatus
  - WorkstationName
