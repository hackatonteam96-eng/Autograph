title: Kerberoasting Precursor - LDAP SPN Enumeration (Event 4662)
id: authgraph-kb-07-ldap-spn-discovery
status: experimental
description: |
  Pre-attack indicator. Attackers query AD for accounts with servicePrincipalName
  before roasting (PowerView Get-DomainUser -SPN, LDAP searches, BloodHound).
  Event 4662 logs directory object access; Property GUID for servicePrincipalName
  or literal property name in Properties field indicates SPN hunting.
  Enable "Audit Directory Service Access" on DCs.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558.003/
  - https://attack.mitre.org/techniques/T1087/002/
tags:
  - attack.credential_access
  - attack.t1558.003
  - attack.discovery
  - attack.t1087.002
logsource:
  product: windows
  service: security
  definition: |
    DC Advanced Audit Policy:
    - Audit Directory Service Access → Success (and Failure optional)
detection:
  selection:
    EventID: 4662
  filter_spn_property:
    Properties|contains: 'servicePrincipalName'
  filter_spn_read:
    AccessMask: '0x100'
    Properties|contains: 'servicePrincipalName'
  condition: selection and 1 of filter_*
falsepositives:
  - AD management tools, SPN registration scripts, Azure AD Connect
  - BloodHound collectors run by red team / IT inventory
level: medium
fields:
  - SubjectUserName
  - ObjectName
  - Properties
  - IpAddress
