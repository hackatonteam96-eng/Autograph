title: Kerberoasting Precursor - SPN Added To User Account (Event 5136)
id: authgraph-kb-08-spn-modification
status: experimental
description: |
  Attacker may register a rogue SPN on a compromised account or modify SPNs before
  roasting (or to enable roasting on a user account that normally has no SPN).
  Event 5136 — Directory Service object modified — Attribute LDAP Display Name
  servicePrincipalName.
  Enable "Audit Directory Service Changes" on DCs.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558.003/
  - https://attack.mitre.org/techniques/T1098/
tags:
  - attack.credential_access
  - attack.t1558.003
  - attack.persistence
  - attack.t1098
logsource:
  product: windows
  service: security
  definition: |
    DC Advanced Audit Policy:
    - Audit Directory Service Changes → Success
detection:
  selection:
    EventID: 5136
    AttributeLDAPDisplayName: 'servicePrincipalName'
  filter_system:
    SubjectUserName|endswith: '$'
  condition: selection and not filter_system
falsepositives:
  - Legitimate SPN registration for new services (IIS, SQL, Kubernetes)
  - setspn.exe run by domain admins during deployments
level: medium
fields:
  - SubjectUserName
  - ObjectDN
  - AttributeValue
  - OperationType
