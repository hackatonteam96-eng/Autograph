title: Kerberoasting - Honeypot SPN TGS Request
id: authgraph-kb-06-honeypot
status: experimental
description: |
  Detects ANY successful TGS request (4769) for a decoy/honeypot SPN you register
  on a dummy user account tied to a non-existent service. Legitimate users never
  request this SPN — any hit is near-certain Kerberoasting or SPN enumeration.
  CUSTOMIZE honeypot_spn values before deploying.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558.003/
  - https://www.picussecurity.com/resource/blog/kerberoasting-attack-explained-mitre-attack-t1558.003
tags:
  - attack.credential_access
  - attack.t1558.003
  - attack.defense_evasion
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    Status: '0x0'
  filter_honeypot:
    ServiceName|contains:
      - 'HONEYPOT/'          # e.g. HONEYPOT/dc01.corp.local:9999
      - 'MSSQLSvc/HONEYPOT'  # e.g. MSSQLSvc/HONEYPOT-SQL.corp.local:1433
      - 'HTTP/honeypot'      # customize to your decoy SPN
  condition: selection and filter_honeypot
falsepositives:
  - None expected if honeypot SPN is truly unused — verify no legit app binds to it
level: critical
fields:
  - TargetUserName
  - ServiceName
  - TicketEncryptionType
  - IpAddress
  - WorkstationName
