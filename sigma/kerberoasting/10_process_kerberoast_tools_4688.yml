title: Kerberoasting Tooling - Process Creation (Event 4688)
id: authgraph-kb-10-process-tools
status: experimental
description: |
  Detects execution of known Kerberoasting binaries and command lines via
  Windows Security Event 4688 (Process Creation). Catches Rubeus, Impacket,
  setspn enumeration, and built-in Windows tools abused for SPN discovery.
  Enable "Audit Process Creation" + include command line (GPO).
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558.003/
  - https://attack.mitre.org/techniques/T1059/
tags:
  - attack.credential_access
  - attack.t1558.003
  - attack.execution
logsource:
  product: windows
  service: security
  definition: |
    GPO: Audit Process Creation → Success
    Include command line in 4688 (Microsoft-Windows-Security-Auditing)
detection:
  selection_rubeus:
    EventID: 4688
    CommandLine|contains:
      - 'kerberoast'
      - 'Kerberoast'
      - 'Rubeus.exe'
      - 'Rubeus '
  selection_impacket:
    EventID: 4688
    CommandLine|contains:
      - 'GetUserSPNs.py'
      - 'getuserspns'
      - 'ticketer.py'
  selection_setspn:
    EventID: 4688
    CommandLine|contains:
      - 'setspn -T'
      - 'setspn -Q'
      - 'setspn /T'
      - 'setspn /Q'
  selection_powershell:
    EventID: 4688
    CommandLine|contains:
      - 'Invoke-Kerberoast'
      - 'Get-DomainSPN'
      - 'Get-NetUser -SPN'
  filter_legit:
    ParentProcessName|contains:
      - 'nessus'
      - 'qualys'
  condition: 1 of selection_* and not filter_legit
falsepositives:
  - IT admins running setspn -Q for inventory
  - Approved penetration tests
level: high
fields:
  - SubjectUserName
  - NewProcessName
  - CommandLine
  - ParentProcessName
