title: Kerberoasting - Failed TGS Request Spray (Event 4769)
id: authgraph-kb-11-failed-spray
status: experimental
description: |
  Catches Kerberoasting spray attempts that fail (wrong SPN, revoked account,
  encryption mismatch). Attackers probing many SPNs generate failed 4769 events
  before successful RC4 tickets. 10+ failed TGS from same user in 5 minutes.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558.003/
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
  filter_success:
    Status: '0x0'
  filter_krbtgt:
    ServiceName|contains: 'krbtgt'
  filter_machine_user:
    TargetUserName|contains: '$@'
  condition: selection and not 1 of filter_success, filter_krbtgt, filter_machine_user | count() by TargetUserName, IpAddress > 10
  timeframe: 5m
falsepositives:
  - Misconfigured application retrying Kerberos auth to wrong SPN
level: medium
fields:
  - TargetUserName
  - ServiceName
  - Status
  - IpAddress
