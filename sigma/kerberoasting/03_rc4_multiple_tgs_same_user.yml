title: Kerberoasting - Burst of RC4 TGS Requests From Same User (10 min)
id: authgraph-kb-03-rc4-burst
status: experimental
description: |
  Detects spray/roast patterns where a single user requests 3+ RC4 TGS tickets
  within 10 minutes — even if some ServiceNames repeat. Catches slower or
  targeted roasting that rule 02 may miss (e.g. repeated attempts on few SPNs).
  Threshold aligned with AuthGraph correlator (MULTIPLE_TGS_THRESHOLD=3).
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558/003/
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    Status: '0x0'
    TicketEncryptionType:
      - '0x17'
      - '0x1'
      - '0x23'
      - '0x3'
  filter_krbtgt:
    ServiceName|contains: 'krbtgt'
  filter_machine_spn:
    ServiceName|endswith: '$'
  filter_machine_user:
    TargetUserName|contains: '$@'
  condition: selection and not 1 of filter_* | count() by TargetUserName > 3
  timeframe: 10m
falsepositives:
  - Users opening many legacy RC4-backed applications in a short session
level: high
fields:
  - TargetUserName
  - ServiceName
  - IpAddress
  - WorkstationName
