title: Kerberoasting - Multiple Unique RC4 SPNs From Same User (5 min)
id: authgraph-kb-02-rc4-multi-spn
status: experimental
description: |
  HIGH FIDELITY Kerberoasting detection. Attack tools (Rubeus, PowerView, Impacket
  GetUserSPNs.py) enumerate many service principals in minutes and request RC4 TGS
  tickets for offline cracking.
  Alerts when the same user+source IP requests 5+ distinct ServiceNames within 5 minutes.
  This is the primary "no attack goes unnoticed" correlation rule.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558/003/
  - https://www.neteye-blog.com/2025/12/hunting-silent-kerberoasting-detecting-rc4-tgs-floods-with-elastic/
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4769
    Status: '0x0'
    TicketEncryptionType:
      - '0x17'
      - '0x1'
      - '0x23'
  filter_krbtgt:
    ServiceName|contains: 'krbtgt'
  filter_machine_spn:
    ServiceName|endswith: '$'
  filter_machine_user:
    TargetUserName|contains: '$@'
  condition: selection and not 1 of filter_* | count_distinct(ServiceName) by TargetUserName, IpAddress > 5
  timeframe: 5m
falsepositives:
  - Rare bulk application deployments touching many legacy RC4 services
  - Misconfigured monitoring scripts authenticating to many SPNs
level: critical
fields:
  - TargetUserName
  - ServiceName
  - IpAddress
  - WorkstationName
  - TicketEncryptionType
