title: AS-REP Roasting - Single RC4 TGT Without Pre-Authentication
id: authgraph-ar-01-single-rc4
status: experimental
description: |
  Detects a successful Kerberos TGT request (Event 4768) where pre-authentication
  was not required (PreAuthType = 0) and the ticket uses RC4 encryption.
  Attackers request AS-REP for accounts with DONT_REQ_PREAUTH and crack offline.
  Layer 1 of AuthGraph ITDR AS-REP Roasting coverage.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/13
references:
  - https://attack.mitre.org/techniques/T1558/004/
  - https://www.harmj0y.net/blog/activedirectory/roasting-as-reps/
tags:
  - attack.credential_access
  - attack.t1558.004
logsource:
  product: windows
  service: security
  definition: |
    Requirements on ALL Domain Controllers:
    - Advanced Audit Policy: Audit Kerberos Authentication Service → Success
    - Wazuh agent collecting Security channel (eventchannel)
detection:
  selection:
    EventID: 4768
    Status: '0x0'
    ServiceName: 'krbtgt'
    PreAuthType:
      - 0
      - '0'
  filter_rc4:
    TicketEncryptionType:
      - '0x17'
      - '0x1'
      - '0x23'
      - '0x3'
      - '23'
      - '1'
      - '3'
  filter_machine_user:
    TargetUserName|endswith: '$'
  filter_krbtgt_account:
    TargetUserName|contains: 'krbtgt'
  condition: selection and filter_rc4 and not 1 of filter_machine_user, filter_krbtgt_account
falsepositives:
  - Legacy accounts with pre-authentication disabled and RC4-only Kerberos
  - Misconfigured service accounts with DONT_REQ_PREAUTH flag
level: medium
fields:
  - TargetUserName
  - ServiceName
  - PreAuthType
  - TicketEncryptionType
  - TicketOptions
  - IpAddress
  - WorkstationName
  - Status
