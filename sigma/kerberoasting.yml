title: Kerberoasting - RC4 Service Ticket Request
id: authgraph-kerberoasting-4769
status: experimental
description: |
  Detects Kerberoasting via Event 4769 — a successful Kerberos TGS request
  encrypted with RC4 for a non-krbtgt, non-machine service principal.
  RC4 tickets can be cracked offline and are the core Kerberoasting indicator.
  Deploy on Domain Controllers with Audit Kerberos Service Ticket Operations enabled.
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/12
references:
  - https://attack.mitre.org/techniques/T1558.003/
  - https://adsecurity.org/?p=3513
tags:
  - attack.credential_access
  - attack.t1558.003
logsource:
  product: windows
  service: security
  definition: |
    Requirements on ALL Domain Controllers:
    - Advanced Audit Policy: Audit Kerberos Service Ticket Operations → Success
    - Wazuh agent collecting Security channel (eventchannel)
detection:
  selection:
    EventID: 4769
    Status: '0x0'
  filter_rc4:
    TicketEncryptionType:
      - '0x17'
      - '0x1'
      - '0x23'
      - '0x3'
      - '23'
      - '1'
      - '3'
  filter_krbtgt:
    ServiceName|contains: 'krbtgt'
  filter_machine_spn:
    ServiceName|endswith: '$'
  filter_machine_user:
    TargetUserName|contains: '$@'
  filter_empty_spn:
    ServiceName: ''
  condition: selection and filter_rc4 and not 1 of filter_krbtgt, filter_machine_spn, filter_machine_user, filter_empty_spn
falsepositives:
  - Legacy applications still negotiating RC4 Kerberos
  - SQL Server or IIS service accounts during scheduled maintenance
  - Vulnerability scanners with authenticated Kerberos enumeration
level: high
fields:
  - TargetUserName
  - ServiceName
  - TicketEncryptionType
  - TicketOptions
  - IpAddress
  - WorkstationName
  - Status
