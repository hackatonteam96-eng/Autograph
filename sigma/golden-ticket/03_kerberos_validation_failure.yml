title: Golden Ticket - Kerberos Ticket Validation Failure
id: authgraph-gt-03-ticket-validation-failure
status: experimental
description: |
  Detects failed Kerberos TGT/TGS operations (4768, 4769, 4771) with status
  codes indicating malformed, tampered, or inconsistent ticket data. The KDC may
  reject golden tickets with invalid PAC, wrong encryption, or format anomalies
  before or during use (Pass-the-Ticket).
author: Gular — AuthGraph ITDR Detection Team
date: 2026/06/13
references:
  - https://attack.mitre.org/techniques/T1558/001/
  - https://github.com/SigmaHQ/sigma/blob/master/rules/windows/builtin/security/win_security_susp_kerberos_manipulation.yml
tags:
  - attack.credential_access
  - attack.t1558.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID:
      - 4768
      - 4769
      - 4771
    Status:
      - '0x9'
      - '0xA'
      - '0xB'
      - '0xF'
      - '0x10'
      - '0x11'
      - '0x13'
      - '0x14'
      - '0x1A'
      - '0x1F'
      - '0x21'
      - '0x22'
      - '0x23'
      - '0x24'
      - '0x26'
      - '0x27'
      - '0x28'
      - '0x29'
      - '0x2C'
      - '0x2D'
      - '0x2E'
      - '0x2F'
      - '0x31'
      - '0x32'
      - '0x3E'
      - '0x3F'
      - '0x40'
      - '0x41'
      - '0x43'
      - '0x44'
  filter_machine_user:
    TargetUserName|endswith: '$'
  condition: selection and not filter_machine_user
falsepositives:
  - Faulty legacy Kerberos clients and misconfigured applications
  - Clock skew between client and DC
level: high
fields:
  - EventID
  - TargetUserName
  - ServiceName
  - Status
  - IpAddress
  - WorkstationName
